name: Comment Preview After Pages

on:
  workflow_run:
    workflows:
      - pages-build-deployment
      - Pages Build and Deployment
      - pages build and deployment
    types:
      - completed

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

jobs:
  comment-preview:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'gh-pages'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout deployed gh-pages commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Read preview metadata
        id: preview
        env:
          PAGES_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          metadata_file="$(
            git show --name-only --format= "$PAGES_SHA" \
              | grep -E '^pr-preview/pr-[0-9]+/\.preview-metadata\.json$' \
              | head -n 1 \
              || true
          )"

          if [[ -z "$metadata_file" ]]; then
            echo "No PR preview metadata changed in this Pages deployment."
            echo "should_comment=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pr_number="$(jq -r '.pr_number // empty' "$metadata_file")"
          preview_url="$(jq -r '.preview_url // empty' "$metadata_file")"

          if ! [[ "$pr_number" =~ ^[0-9]+$ ]]; then
            echo "Invalid PR number in $metadata_file: $pr_number"
            exit 1
          fi

          if [[ -z "$preview_url" ]]; then
            echo "Missing preview URL in $metadata_file"
            exit 1
          fi

          echo "should_comment=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

      - name: Comment PR with Preview URL
        if: steps.preview.outputs.should_comment == 'true'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          number_force: ${{ steps.preview.outputs.pr_number }}
          message: |
            🚀 Preview deployment: ${{ steps.preview.outputs.preview_url }}
